name: Build RuStore APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Fix Translate Bug
      run: |
        if [ -d "app/src/main/java/com/вадим" ]; then
          mkdir -p app/src/main/java/com/vadim
          mv app/src/main/java/com/вадим/* app/src/main/java/com/vadim/
          rm -rf app/src/main/java/com/вадим
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build App
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Extramos-AI
        path: app/build/outputs/apk/debug/*.apk
